<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Genesis Aquarium</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stream-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Genesis Aquarium</h1>
        <p>世界の栄枯盛衰を、ただ観測する。</p>
      </div>
      <div id="worldSummary" class="world-summary"></div>
    </header>

    <main class="broadcast-layout">
      <section class="main-stage">
        <section class="panel world-panel">
          <div class="section-label">WORLD</div>
          <div class="canvas-frame">
            <canvas id="worldCanvas" width="960" height="560" aria-label="世界マップ"></canvas>
          </div>
          <div class="legend">
            <span>🌊 海</span>
            <span>🌿 草原</span>
            <span>🌲 森</span>
            <span>⛰ 山</span>
            <span>🏠 集落</span>
            <span>☄ 災害</span>
          </div>
        </section>

        <section class="panel drama-panel">
          <div class="drama-heading">
            <span>NOW PLAYING</span>
            <h2>いま起きているドラマ</h2>
          </div>
          <div id="dramaScene" class="drama-scene"></div>
        </section>

        <section class="info-grid">
          <article class="panel compact">
            <h2>世界の状態</h2>
            <div id="worldState"></div>
          </article>

          <article class="panel compact">
            <h2>文明・共同体</h2>
            <div id="civilizationState"></div>
          </article>

          <article class="panel compact cast-panel">
            <h2>注目キャラクター</h2>
            <div id="castState"></div>
          </article>
        </section>
      </section>

      <aside class="panel news-panel">
        <div class="news-heading">
          <span>CHRONICLE</span>
          <h2>世界年代記</h2>
        </div>
        <div id="newsFeed" class="news-feed"></div>
      </aside>
    </main>
  </div>

  <div class="hidden-controls" aria-hidden="true">
    <input id="seedInput" />
    <button id="newWorldBtn">新しい世界</button>
    <button id="pauseBtn">一時停止</button>
    <select id="speedSelect">
      <option value="1">x1</option>
      <option value="2">x2</option>
      <option value="5" selected>x5</option>
      <option value="12">x12</option>
    </select>
    <button id="nextDramaBtn">次のドラマ</button>
    <button id="clearNewsBtn">表示整理</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
